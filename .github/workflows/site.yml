name: site
# Build the Hugo site under site/ and deploy to GitHub Pages.
# Triggered on push to main when anything under site/ changes.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Hugo
        run: |
          HUGO_VERSION=0.157.0
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin hugo
          hugo version
      - name: Build
        working-directory: site
        run: hugo --minify

      - name: Set up Python (for link checker + its tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Unit-test the link checker
        run: python -m pytest site/tests/test_check_links.py -q

      # Hard gate before deploy: every internal href in the built site
      # must resolve to a real file under site/public/. Catches the kind
      # of 404 that happens when you rename or consolidate pages and
      # forget to add aliases.
      - name: Check internal links in built site
        run: python site/tests/check_links.py site/public

      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
