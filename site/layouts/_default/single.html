{{ define "main" }}
<article class="page">
  <header>
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end }}
  </header>
  <div class="content">
    {{ .Content }}
  </div>
  {{ with .Params.next }}
  <nav class="page-next">
    <a href="{{ . }}">next →</a>
  </nav>
  {{ end }}
</article>
{{ end }}
