<div class="svg-frame chart-frame">
<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" aria-label="Data scale ablation: 5M vs 30M positions at UCI=1800" class="diagram chart">

  <!-- y-axis: 1500 → 2100; y(elo) = 200 - (elo - 1500)/600 * 160 -->
  <line x1="100" y1="200" x2="600" y2="200" class="axis"/>
  <line x1="100" y1="40"  x2="100" y2="200" class="axis"/>

  <g class="tick">
    <line x1="96" y1="200" x2="100" y2="200"/>
    <text x="90" y="204" text-anchor="end">1500</text>
  </g>
  <g class="tick">
    <line x1="96" y1="120" x2="100" y2="120"/>
    <line x1="100" y1="120" x2="600" y2="120" class="grid"/>
    <text x="90" y="124" text-anchor="end">1800</text>
  </g>
  <g class="tick">
    <line x1="96" y1="67" x2="100" y2="67"/>
    <line x1="100" y1="67" x2="600" y2="67" class="grid"/>
    <text x="90" y="71" text-anchor="end">2000</text>
  </g>
  <g class="tick">
    <line x1="96" y1="40"  x2="100" y2="40"/>
    <text x="90" y="44" text-anchor="end">2100</text>
  </g>

  <!-- bar 1: 5M positions, 1810 Elo  y = 200 - (1810-1500)/600*160 = 117.3 -->
  <rect x="180" y="117" width="100" height="83" class="bar dim" rx="1"/>
  <text x="230" y="113" text-anchor="middle" class="big">1,810</text>
  <text x="230" y="220" text-anchor="middle" class="annot">5M positions</text>
  <text x="230" y="234" text-anchor="middle" class="annot dim">d15 teacher · baseline</text>

  <!-- bar 2: 30M positions, 2009 Elo  y = 200 - (2009-1500)/600*160 = 200 - 135.7 = 64.3 -->
  <rect x="380" y="64" width="100" height="136" class="bar" rx="1"/>
  <text x="430" y="60" text-anchor="middle" class="big">2,009</text>
  <text x="430" y="220" text-anchor="middle" class="annot accent">30M positions</text>
  <text x="430" y="234" text-anchor="middle" class="annot dim">d10 teacher · 6× data</text>

  <!-- delta arrow -->
  <line x1="280" y1="117" x2="380" y2="64" class="delta"/>
  <text x="330" y="83" text-anchor="middle" class="annot accent">+199 Elo</text>
  <text x="330" y="98" text-anchor="middle" class="annot dim">weaker teacher, more data</text>

  <text x="350" y="252" text-anchor="middle" class="axis-label">Training-set size</text>
  <text x="56" y="120" text-anchor="middle" class="axis-label" transform="rotate(-90 56 120)">Agent Elo (UCI=1,800)</text>
</svg>
</div>
