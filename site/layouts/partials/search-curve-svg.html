<div class="svg-frame chart-frame">
<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" aria-label="Elo vs MCTS sims at eval" class="diagram chart">
  <!-- axes -->
  <line x1="80" y1="200" x2="600" y2="200" class="axis"/>
  <line x1="80" y1="40"  x2="80"  y2="200" class="axis"/>

  <!-- y-axis ticks: 1600, 1800, 2000, 2200 -->
  <g class="tick">
    <line x1="76" y1="180" x2="80" y2="180"/>
    <text x="70" y="184" text-anchor="end">1600</text>
  </g>
  <g class="tick">
    <line x1="76" y1="140" x2="80" y2="140"/>
    <text x="70" y="144" text-anchor="end">1800</text>
  </g>
  <g class="tick">
    <line x1="76" y1="100" x2="80" y2="100"/>
    <text x="70" y="104" text-anchor="end">2000</text>
  </g>
  <g class="tick">
    <line x1="76" y1="60" x2="80" y2="60"/>
    <text x="70" y="64" text-anchor="end">2200</text>
  </g>

  <!-- x-axis ticks: 200, 800, 2000, 4000, 8000, 16000 (log) -->
  <!-- pos = 80 + 520 * (log2(n) - log2(200)) / (log2(16000) - log2(200)) -->
  <g class="tick">
    <line x1="80"  y1="200" x2="80"  y2="204"/>
    <text x="80"  y="218" text-anchor="middle">200</text>
  </g>
  <g class="tick">
    <line x1="231" y1="200" x2="231" y2="204"/>
    <text x="231" y="218" text-anchor="middle">800</text>
  </g>
  <g class="tick">
    <line x1="332" y1="200" x2="332" y2="204"/>
    <text x="332" y="218" text-anchor="middle">2k</text>
  </g>
  <g class="tick">
    <line x1="408" y1="200" x2="408" y2="204"/>
    <text x="408" y="218" text-anchor="middle">4k</text>
  </g>
  <g class="tick">
    <line x1="484" y1="200" x2="484" y2="204"/>
    <text x="484" y="218" text-anchor="middle">8k</text>
  </g>
  <g class="tick">
    <line x1="560" y1="200" x2="560" y2="204"/>
    <text x="560" y="218" text-anchor="middle">16k</text>
  </g>

  <!-- axis labels -->
  <text x="340" y="246" text-anchor="middle" class="axis-label">MCTS sims / move at eval (log scale)</text>
  <text x="36" y="120" text-anchor="middle" class="axis-label" transform="rotate(-90 36 120)">Agent Elo</text>

  <!-- implied curve (dashed): pure illustration of what the saturation
       eventually looks like; only the two solid points are measured. -->
  <path d="M 80,168 Q 200,148 231,143 Q 330,128 408,82 Q 500,68 560,62" class="curve-dashed"/>

  <!-- measured points -->
  <!-- 800 sims, 1807 Elo  -> x=231, y=200 - (1807-1600)/600*160 = 200 - 55.2 = 144.8 -->
  <g class="point baseline">
    <circle cx="231" cy="145" r="6"/>
    <text x="245" y="138" class="annot">800 sims → 1,807 Elo</text>
  </g>
  <!-- 4000 sims, 2084 Elo -> x=408, y=200 - (2084-1600)/600*160 = 200 - 129 = 71 -->
  <g class="point primary">
    <circle cx="408" cy="71" r="8"/>
    <text x="422" y="64" class="annot accent">4,000 sims → 2,084 Elo</text>
  </g>

  <!-- delta annotation -->
  <line x1="231" y1="145" x2="231" y2="71" class="delta"/>
  <line x1="231" y1="71"  x2="402" y2="71" class="delta"/>
  <text x="260" y="108" class="annot accent">+277 Elo</text>
  <text x="260" y="125" class="annot dim">no retraining · same checkpoint</text>
</svg>
</div>
