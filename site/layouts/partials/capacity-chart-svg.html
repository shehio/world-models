<div class="svg-frame chart-frame">
<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" aria-label="Capacity ablation: 20-block vs 40-block ResNet" class="diagram chart">

  <!-- y-axis: 1500 → 2100, evenly spaced -->
  <!-- y(elo) = 200 - (elo - 1500) / 600 * 160  =>  range 200..40 -->
  <line x1="100" y1="200" x2="600" y2="200" class="axis"/>
  <line x1="100" y1="40"  x2="100" y2="200" class="axis"/>

  <!-- gridlines + ticks at 1500/1800/2100 -->
  <g class="tick">
    <line x1="96" y1="200" x2="100" y2="200"/>
    <text x="90" y="204" text-anchor="end">1500</text>
  </g>
  <g class="tick">
    <line x1="96" y1="120" x2="100" y2="120"/>
    <line x1="100" y1="120" x2="600" y2="120" class="grid"/>
    <text x="90" y="124" text-anchor="end">1800</text>
  </g>
  <g class="tick">
    <line x1="96" y1="40"  x2="100" y2="40"/>
    <text x="90" y="44" text-anchor="end">2100</text>
  </g>

  <!-- baseline-expected-if-capacity-bound, dotted at ~2000 -->
  <line x1="100" y1="93" x2="600" y2="93" class="baseline-line"/>
  <text x="595" y="88" text-anchor="end" class="annot dim">if capacity were the bottleneck</text>

  <!-- bar 1: 20-block, 1810 Elo  y = 200 - (1810-1500)/600*160 = 200 - 82.7 = 117.3 -->
  <rect x="180" y="117" width="100" height="83" class="bar dim" rx="1"/>
  <text x="230" y="113" text-anchor="middle" class="big">1,810</text>
  <text x="230" y="220" text-anchor="middle" class="annot">20 × 256</text>
  <text x="230" y="234" text-anchor="middle" class="annot dim">~24M params</text>

  <!-- bar 2: 40-block, 1810 Elo (identical) -->
  <rect x="380" y="117" width="100" height="83" class="bar" rx="1"/>
  <text x="430" y="113" text-anchor="middle" class="big">1,810</text>
  <text x="430" y="220" text-anchor="middle" class="annot accent">40 × 256 (2× depth)</text>
  <text x="430" y="234" text-anchor="middle" class="annot dim">~48M params</text>

  <!-- delta = 0 annotation -->
  <line x1="280" y1="117" x2="380" y2="117" class="delta"/>
  <text x="330" y="105" text-anchor="middle" class="annot accent">Δ = 0</text>

  <!-- axis labels -->
  <text x="350" y="252" text-anchor="middle" class="axis-label">Network capacity</text>
  <text x="56" y="120" text-anchor="middle" class="axis-label" transform="rotate(-90 56 120)">Agent Elo (UCI=1,800)</text>
</svg>
</div>
