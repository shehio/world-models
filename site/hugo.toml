baseURL = "https://shehio.github.io/world-models/"
languageCode = "en-us"
title = "world-models — chess & go, distilled from Stockfish/KataGo on one GPU"
# Rewrite absolute URLs in content (e.g. /baseline/) so they pick up the
# /world-models/ subpath when deployed to project Pages.
canonifyURLs = true

[params]
  description = "AlphaZero's network on one GPU, ~10,000x less compute. Supervised distillation from Stockfish, then RL self-play."

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.tableOfContents]
    # Only h2 headings in the "On This Page" sidebar. Including h3 made
    # the TOC a flat list of every subsection (~25 entries on the
    # experiments page) with no visual nesting, pushing it past the
    # viewport. h2-only keeps the sidebar to a scannable ~6-10 entries.
    startLevel = 2
    endLevel = 2
    ordered = false

[outputs]
  home = ["HTML"]
  page = ["HTML"]
