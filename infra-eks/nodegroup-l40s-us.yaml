# Third nodegroup for the us-east training cluster — L40S (Ada Lovelace
# Gen 2) for d15 in-RAM training. L40S has ~3x the bf16 tensor-core
# throughput and ~3x the memory bandwidth of L4, which is what bottlenecks
# the 20x256 ResNet at our batch sizes.
#
# Apply: eksctl create nodegroup -f nodegroup-l40s-us.yaml
# The cluster (wm-chess-train) must already exist.

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: wm-chess-train
  region: us-east-1
  version: "1.31"

managedNodeGroups:
  - name: gpu-l40s
    instanceTypes:
      - g6e.xlarge       # L40S + 32 GB RAM + 4 vCPU, ~$1.86/h on-demand
    spot: false
    minSize: 0
    desiredCapacity: 1
    maxSize: 1
    volumeSize: 150      # image + npz + 5M-position extract + ckpts
    amiFamily: AmazonLinux2
    labels:
      role: gpu-l40s     # nodeSelector target for the d15 in-RAM Job
    privateNetworking: false
