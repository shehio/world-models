# KataGo analysis-engine config for wm-go datagen pods (CPU/eigenavx2 backend).
# Tuned for c7a.8xlarge (32 vCPUs). Mirrors the upstream `analysis_example.cfg`
# with thread count adjusted for our per-pod parallelism: each pod runs N
# worker processes, each spawning ONE katago analysis engine, and each engine
# uses these thread settings — so total threads = N_workers × numAnalysisThreads.

# Conservative analysis-engine threading. We get parallelism from running
# many worker processes per pod (one katago subprocess each), not from
# squeezing many threads into a single engine.
numAnalysisThreads = 4
numSearchThreads = 4

# Standard ruleset for distillation data — matches the spike + the
# distill_go.config default.
rules = tromp-taylor
komi = 7.5

# Logging hygiene: keep KataGo out of the pod's stdout so the entrypoint's
# log lines stay scannable. Per-game logs go to /tmp/katago-logs.
logFile = /tmp/katago-logs/analysis.log
logToStderr = false
logAllRequests = false
logAllResponses = false
logSearchInfo = false

# Don't spam analysis-info lines back to the client during search.
reportAnalysisWinratesAs = SIDETOMOVE
