# Second managed nodegroup for the us-east training cluster.
# Bigger box for the d10 run: 16 vCPU, 64 GB RAM (lets us load the
# whole subsampled dataset into RAM, no memmap thrash), L4 GPU.
#
# Apply: eksctl create nodegroup -f nodegroup-fast-us.yaml
# The cluster (wm-chess-train) must already exist.

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: wm-chess-train
  region: us-east-1
  version: "1.31"

managedNodeGroups:
  - name: gpu-fast
    instanceTypes:
      - g6.4xlarge       # L4 + 64 GB RAM + 16 vCPU, $1.61/h on-demand
    spot: false
    minSize: 0
    desiredCapacity: 1
    maxSize: 1
    volumeSize: 150      # buffer for image + extracted data + ckpts
    amiFamily: AmazonLinux2
    labels:
      role: gpu-fast     # nodeSelector target for the d10 Job
    privateNetworking: false
