# IRSA service account for wm-go datagen pods. eksctl creates the IAM
# role + binding via the iam.serviceAccounts block in cluster-gen-go-use2.yaml;
# this manifest is just so kubectl apply -f infra-eks/k8s/ works
# idempotently when the cluster is already in place.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: wm-go-runner
  namespace: default
  annotations:
    eks.amazonaws.com/role-name: wm-go-runner
