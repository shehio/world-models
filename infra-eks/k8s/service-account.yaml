# Service account with IAM role bound via OIDC. The IAM role grants
# read/write to a single S3 bucket (wm-chess-library by convention).
# Created by run.sh via eksctl create iamserviceaccount; this manifest
# is documentation of the SA name only.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: wm-chess-runner
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: PLACEHOLDER_ROLE_ARN
