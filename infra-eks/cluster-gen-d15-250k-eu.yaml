# d15 250K datagen cluster — eu-central-1 (Frankfurt) failover.
#
# Migration target when us-east-1 spot pool becomes hostile (as it did
# on 2026-05-20 evening: pods getting reclaimed within 30s of spawning,
# Job controller getting stuck after every reclaim wave). eu-central-1
# has an independent spot pool — different capacity, different demand
# patterns — so a workload that's churning in us-east-1 may be perfectly
# stable in eu.
#
# Cross-region: pods read/write the same us-east-1 S3 bucket. AWS S3 is
# region-aware via the API, no extra config needed — just be explicit
# with --region us-east-1 in any aws cli calls inside the entrypoint
# (already done). Egress cost for the ~14 GB total dataset: ~$0.30.
#
# ECR: image lives in us-east-1, pulled cross-region. Adds ~30s to first
# pull per node; subsequent pulls are local cache.
#
# Apply: eksctl create cluster -f infra-eks/cluster-gen-d15-250k-eu.yaml
# Tear:  eksctl delete cluster -f infra-eks/cluster-gen-d15-250k-eu.yaml

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: wm-chess-gen-d15-250k-eu
  region: eu-central-1
  version: "1.31"
  tags:
    Project: wm-chess
    Component: datagen-d15-250k-eu
    ManagedBy: eksctl

iam:
  withOIDC: true
  serviceAccounts:
    - metadata:
        name: wm-chess-runner
        namespace: default
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

managedNodeGroups:
  - name: workers-spot-d15-250k-eu
    # NO c5/m5 — see feedback_no_slow_nodes.md. Same instance family as
    # the us-east-1 cluster so per-pod throughput is identical (the
    # migration trades spot availability, not compute speed).
    instanceTypes:
      - c7i.8xlarge
      - c7a.8xlarge
      - c6i.8xlarge
      - c6a.8xlarge
      - m7i.8xlarge
      - m6i.8xlarge
    spot: true
    desiredCapacity: 8
    minSize: 0
    maxSize: 10
    volumeSize: 80
    volumeType: gp3
    ssh:
      enableSsm: true
    labels:
      role: worker
      capacityType: spot
    taints: []
    tags:
      Project: wm-chess

addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: aws-ebs-csi-driver
    wellKnownPolicies:
      ebsCSIController: true
