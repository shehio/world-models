# KataGo analysis-engine config for GPU pods (cuda12 backend).
# Tuned for g6.xlarge (1× NVIDIA L4 + 4 vCPU): one analysis engine per pod,
# higher per-engine thread count since we're not contending across multiple
# worker processes.

numAnalysisThreads = 1
numSearchThreads = 16

# REQUIRED for cuda/cudnn/trt builds (eigen build silently defaults this,
# cuda builds throw IOError "Could not find key 'nnMaxBatchSize'" without it).
# We only run one query at a time per katago process, so 1 is enough; higher
# values let katago batch multiple in-flight queries together. Set to 8
# for safety (cheap if unused, helps if we ever switch to batched eval).
nnMaxBatchSize = 8

# Standard distillation ruleset.
rules = tromp-taylor
komi = 7.5

# CUDA device selection.
cudaUseFP16 = auto
cudaUseNHWC = auto

# Logging hygiene — same as CPU config; keep stdout clean.
logFile = /tmp/katago-logs/analysis.log
logToStderr = false
logAllRequests = false
logAllResponses = false
logSearchInfo = false

reportAnalysisWinratesAs = SIDETOMOVE
