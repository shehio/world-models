# CodeBuild buildspec for the wm-go GPU image.
# Builds Dockerfile.wm-go-gpu (cuda12 KataGo on nvidia/cuda runtime),
# pushes to us-east-2 ECR as wm-go-gpu.

version: 0.2

phases:
  pre_build:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - aws ecr describe-repositories --region "$AWS_REGION" --repository-names "$ECR_REPO" >/dev/null 2>&1 || aws ecr create-repository --region "$AWS_REGION" --repository-name "$ECR_REPO" >/dev/null
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
      - IMAGE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest"
      - echo "Image tag $IMAGE"
  build:
    commands:
      - docker build --platform linux/amd64 -t "$IMAGE" -f infra-eks/Dockerfile.wm-go-gpu .
  post_build:
    commands:
      - docker push "$IMAGE"
      - echo "Pushed $IMAGE"
