# Training cluster (GPU) for eu-west-1.  See cluster-train-us.yaml for the
# design notes; only the region + GPU instance availability changes.

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: wm-chess-train
  region: eu-west-1
  version: "1.31"
  tags:
    Project: wm-chess
    Component: training
    ManagedBy: eksctl

iam:
  withOIDC: true
  serviceAccounts:
    - metadata:
        name: wm-chess-train-sa
        namespace: default
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

managedNodeGroups:
  - name: gpu-od
    instanceTypes:
      - g6.xlarge        # L4 24 GB
      - g5.xlarge        # A10G 24 GB (fallback)
    spot: false
    minSize: 0
    desiredCapacity: 1
    maxSize: 1
    volumeSize: 100
    amiFamily: AmazonLinux2
    labels:
      role: gpu-trainer
    taints:
      - key: nvidia.com/gpu
        value: "true"
        effect: NoSchedule
    privateNetworking: false
