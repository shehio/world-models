# Training cluster (GPU) for eu-west-1.  See cluster-train-us.yaml for the
# design notes; only the region + GPU instance availability changes.

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: wm-chess-train
  region: eu-west-1
  version: "1.31"
  tags:
    Project: wm-chess
    Component: training
    ManagedBy: eksctl

iam:
  withOIDC: true
  serviceAccounts:
    - metadata:
        name: wm-chess-train-sa
        namespace: default
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

managedNodeGroups:
  - name: gpu-spot
    instanceTypes:
      # g6.xlarge is NOT offered in eu-west-1 — fall back to g5/g4dn.
      # On-demand G/VT quota is 0 in this region (only spot quota of 128
      # vCPU), so spot is mandatory not a choice.
      - g5.xlarge        # A10G 24 GB, ~$0.40/h spot eu-west
      - g4dn.xlarge      # T4 16 GB, ~$0.20/h spot eu-west (fallback)
    spot: true
    minSize: 0
    desiredCapacity: 1
    maxSize: 1
    # 250 GB to hold:
    #   - 3.2 GB docker image
    #   - 2.5 GB merged data.npz
    #   - ~145 GB extracted .npy files (memmap-readable; entrypoint
    #     extracts on first run via _extract_npz_to_memmap_dir)
    #   - ~5 GB checkpoints over 20 epochs
    #   - OS + buffer
    volumeSize: 250
    amiFamily: AmazonLinux2
    labels:
      role: gpu-trainer
    # No taint: this cluster's only purpose is the training Job, and the
    # taint blocked CoreDNS (and other system pods) from scheduling
    # since they don't tolerate nvidia.com/gpu. The nodeSelector
    # `role=gpu-trainer` is what actually targets the GPU node for the
    # Job; the taint added nothing here.
    privateNetworking: false
