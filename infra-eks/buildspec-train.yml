# CodeBuild buildspec for the wm-chess-gpu (training) image.
# Same shape as buildspec.yml but points at Dockerfile.train and pushes
# to the wm-chess-gpu repo. ECR cross-region replication (prefix
# wm-chess) mirrors the result to eu-west-1 automatically.
#
# Trigger:
#   aws codebuild start-build --region us-east-1 \
#     --project-name wm-chess-image \
#     --buildspec-override infra-eks/buildspec-train.yml \
#     --environment-variables-override \
#       name=ECR_REPO,value=wm-chess-gpu \
#       name=AWS_REGION,value=us-east-1

version: 0.2

phases:
  pre_build:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - aws ecr describe-repositories --region "$AWS_REGION" --repository-names "$ECR_REPO" >/dev/null 2>&1 || aws ecr create-repository --region "$AWS_REGION" --repository-name "$ECR_REPO" >/dev/null
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
      - IMAGE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest"
      - echo "Image tag $IMAGE"
  build:
    commands:
      - docker build --platform linux/amd64 -t "$IMAGE" -f infra-eks/Dockerfile.train .
  post_build:
    commands:
      - docker push "$IMAGE"
      - echo "Pushed $IMAGE"
