# Training cluster (GPU) for us-east-1.
#
# Separate from cluster.yaml (the CPU datagen cluster) so the two
# workflows can run independently and so the GPU cluster can be torn
# down the moment training is done — GPU control planes bill while
# the cluster exists, GPU nodes bill while they're up.
#
# Apply: eksctl create cluster -f cluster-train-us.yaml
# Tear:  eksctl delete cluster -f cluster-train-us.yaml

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: wm-chess-train
  region: us-east-1
  version: "1.31"
  tags:
    Project: wm-chess
    Component: training
    ManagedBy: eksctl

iam:
  withOIDC: true
  serviceAccounts:
    - metadata:
        name: wm-chess-train-sa
        namespace: default
      # The training pod needs to GET merged/data.npz and PUT
      # checkpoints/*.pt. Using AWS-managed S3 RW for simplicity; tighten
      # later if needed.
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

# GPU node group. Spot for cost — entrypoint-train.sh has resume-from-
# ckpt that pulls the latest distilled_epoch*.pt from S3 if a previous
# attempt was reclaimed, so the worst case is losing up to SAVE_EVERY
# epochs (default 5).
managedNodeGroups:
  - name: gpu-od
    instanceTypes:
      - g6.xlarge        # L4 24 GB, $0.80/h us-east on-demand
      - g5.xlarge        # A10G 24 GB, $1.006/h us-east on-demand
      - g4dn.xlarge      # T4 16 GB, $0.526/h us-east on-demand
    # On-demand. Spot in us-east hit UnfulfillableCapacity twice during
    # the initial rollout (g6+g5+g4dn) and lost a running g4dn node
    # within 30 min. Account has 32 vCPU OD G/VT quota — plenty for
    # one g6.xlarge (4 vCPU). Pay extra for predictability.
    spot: false
    minSize: 0
    desiredCapacity: 1
    maxSize: 1
    volumeSize: 100      # 30 GB image + 0.5 GB data + 1 GB ckpts = comfy at 100
    amiFamily: AmazonLinux2
    labels:
      role: gpu-trainer
    # No taint — see cluster-train-eu.yaml comment. Single-purpose
    # training cluster; nodeSelector role=gpu-trainer is sufficient.
    privateNetworking: false
